name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-basic:
    name: Build and Test Basic Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3400db9b532ac92f77d6410d7834873966dd67a4 # main

      - name: Build
        run: cargo build
        working-directory: basic

      - name: Test
        run: cargo test
        working-directory: basic

  validate-basic:
    name: Validate Basic Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3400db9b532ac92f77d6410d7834873966dd67a4 # main

      - name: Check model
        run: weaver registry check -r ./basic/model --diagnostic-format gh_workflow_command

      - name: Resolve registry
        run: weaver registry resolve -r ./basic/model -o resolved.json

  check-generated-code:
    name: Check Generated Rust Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3400db9b532ac92f77d6410d7834873966dd67a4 # main

      - name: Generate Rust code
        run: |
          cd basic
          weaver registry generate \
            -r ./model \
            --templates ./templates \
            rust ./src

      - name: Check for uncommitted changes
        run: |
          cd basic
          if ! git diff --exit-code ./src/attributes.rs ./src/metrics.rs; then
            echo "❌ Generated code is out of sync!"
            echo ""
            echo "The generated Rust code differs from committed files."
            echo "Please regenerate locally and commit the changes:"
            echo ""
            echo "  cd basic"
            echo "  weaver registry generate -r ./model --templates ./templates rust ./src"
            echo "  git add src/attributes.rs src/metrics.rs"
            echo "  git commit -m 'chore: regenerate Rust code'"
            echo ""
            exit 1
          fi
          echo "✅ Generated code is up to date"

  check-generated-docs:
    name: Check Generated Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3400db9b532ac92f77d6410d7834873966dd67a4 # main

      - name: Generate documentation
        run: |
          cd basic
          weaver registry generate \
            -r ./model \
            --templates "https://github.com/open-telemetry/semantic-conventions/archive/refs/tags/v1.37.0.zip[templates]" \
            markdown ./docs

      - name: Check for uncommitted changes
        run: |
          cd basic
          if ! git diff --exit-code ./docs; then
            echo "❌ Generated documentation is out of sync!"
            echo ""
            echo "The generated documentation differs from committed files."
            echo "Please regenerate locally and commit the changes:"
            echo ""
            echo "  cd basic"
            echo "  weaver registry generate -r ./model --templates \"https://github.com/open-telemetry/semantic-conventions/archive/refs/tags/v1.37.0.zip[templates]\" markdown ./docs"
            echo "  git add docs/"
            echo "  git commit -m 'docs: regenerate documentation'"
            echo ""
            exit 1
          fi
          echo "✅ Generated documentation is up to date"

  validate-custom-advisor:
    name: Validate Custom Advisor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@3400db9b532ac92f77d6410d7834873966dd67a4 # main

      - name: Check model
        run: weaver registry check -r ./custom_advisor/model

      - name: Test policies with sample data
        run: |
          cd custom_advisor
          # This example demonstrates finding issues, so live-check exits non-zero.
          # Capture output and verify the expected finding is present.
          output=$(weaver registry live-check -r model --input-source samples/metrics.json --advice-policies policies 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "invalid_value_case"
